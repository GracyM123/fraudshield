spring.application.name=fraud-detection-backend
spring.datasource.url=jdbc:postgresql://localhost:5432/frauddb
spring.datasource.username=frauduser
spring.datasource.password=fraudpass
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
server.port=${PORT:8080}

# Anomaly detection thresholds
anomaly.zscore.threshold=2.5
anomaly.velocity.max-transactions-per-minute=5
anomaly.amount.max-single-transaction=9500.00
anomaly.geography.suspicious-countries=NG,RU,KP,IR

# CORS
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}
